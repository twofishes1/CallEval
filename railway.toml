[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Railpack fallback (when Dockerfile builder is not selected):
buildCommand = "pip install -r requirements.txt && npm ci --prefix frontend && npm run build --prefix frontend && mkdir -p eval1/outputs eval1/data/uploads"

[deploy]
startCommand = "sh scripts/railway_start.sh"
# Disable healthcheck wait — app loads heavy deps after boot; /health responds immediately
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
